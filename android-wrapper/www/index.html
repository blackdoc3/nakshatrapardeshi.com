<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f7f4ee" />
  <title>NRI Cleanup Desk</title>
  <style>
    :root{color-scheme:light;--bg:#f7f4ee;--ink:#17211b;--muted:#667268;--accent:#0f6b4f;--line:#e4dacb}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(15,107,79,.12),transparent 26rem),var(--bg);color:var(--ink);line-height:1.6}
    main{width:min(560px,100%);padding:28px;border:1px solid var(--line);border-radius:28px;background:rgba(255,255,255,.78);box-shadow:0 24px 70px rgba(44,36,24,.12);text-align:center}
    .mark{display:grid;place-items:center;width:64px;height:64px;margin:0 auto 18px;border-radius:18px;background:var(--accent);color:#fff;font-weight:950;font-size:24px;letter-spacing:-.08em}
    h1{margin:0 0 10px;font-size:clamp(28px,7vw,44px);line-height:1;letter-spacing:-.05em}
    p{margin:0 0 18px;color:var(--muted)}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 18px;border-radius:999px;background:var(--accent);color:#fff;text-decoration:none;font-weight:900}
  </style>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      window.location.replace('https://www.nakshatrapardeshi.com/nri-cleanup/');
    });
  </script>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">NC</div>
    <h1>NRI Cleanup Desk</h1>
    <p>Opening the live NRI Financial Cleanup Desk experience.</p>
    <a href="https://www.nakshatrapardeshi.com/nri-cleanup/">Open now</a>
  </main>
</body>
</html>
