<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f7f4ee" />
  <title>NRI Cleanup Desk — Offline</title>
  <style>
    :root{color-scheme:light;--bg:#f7f4ee;--ink:#17211b;--muted:#667268;--accent:#0f6b4f;--line:#e4dacb}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
    main{width:min(560px,100%);padding:28px;border:1px solid var(--line);border-radius:28px;background:#fff;box-shadow:0 24px 70px rgba(44,36,24,.12)}
    .mark{display:grid;place-items:center;width:64px;height:64px;margin-bottom:18px;border-radius:18px;background:var(--accent);color:#fff;font-weight:950;font-size:24px;letter-spacing:-.08em}
    h1{margin:0 0 10px;font-size:clamp(28px,7vw,42px);line-height:1;letter-spacing:-.05em}
    p{margin:0 0 14px;color:var(--muted)}
    a{color:var(--accent);font-weight:900}
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">NC</div>
    <h1>Could not load NRI Cleanup Desk</h1>
    <p>This Android MVP loads the live website. Please check mobile data/Wi‑Fi and try again.</p>
    <p><a href="https://www.nakshatrapardeshi.com/nri-cleanup/">Retry opening the live page</a></p>
    <p>This screen does not store data and does not provide advice.</p>
  </main>
</body>
</html>
